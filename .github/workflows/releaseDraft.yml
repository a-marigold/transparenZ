name: release draft

on: 
  workflow_run:
    workflows: [ci]
    types:
      - completed

jobs: 
  release draft: 
    if: | 
      ${{ github.event.workflow_run.conclusion == success 
      && startsWith(github.event.workflow_run.head_branch 'refs/tags/v') }}

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: set up zig
        uses: mlugg/setup-zig@v2

      - name: build
        run: | 
          FLAGS="src/main.zig -O ReleaseFast -fsingle-threaded -fno-unwind-tables -fstrip"
          
          zig build-exe -target x86_64-windows -femit-bin='zig-out/x86_64-transparenZ.exe'

          zig build-exe -target aarch64-windows -femit-bin='zig-out/aarch64-transparenZ.exe'

      - name: create draft
        uses: softprops/action-gh-release@v2
        with: 
          name: ${{ github.ref_name }}
          draft: true
          generate_release_notes: false
          files: |
            zig-out/*.exe
