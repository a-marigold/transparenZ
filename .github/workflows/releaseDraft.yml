name: release draft

on: 
  workflow_run:
    workflows: [ci]
    types:
      - completed

jobs: 
  release draft: 
    if: | 
      ${{ github.event.workflow_run.conclusion == success 
      && startsWith(github.event.workflow_run.head_branch 'refs/tags/v') }}

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: set up zig
        uses: mlugg/setup-zig@v2

      - name: build
        run: | 
          mkdir zig-out

          ./build.sh x86_64-windows x86_64-transparenZ.tar.gz
          ./build.sh aarch-64-windows aarch64-transparenZ.tar.gz

      - name: create draft
        uses: softprops/action-gh-release@v2
        with: 
          name: ${{ github.ref_name }}
          draft: true
          generate_release_notes: false
          files: |
            x86_64-transparenZ.tar.gz
            aarch64-transparenZ.tar.gz
